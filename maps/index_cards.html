<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>STAGdb map browser</title>

<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 40px;
    max-width: 1400px;
    line-height: 1.5;
    color: #333;
    background: #fafafa;
  }

  h1 {
    margin-bottom: 0.2em;
  }

  p {
    margin-top: 0;
    color: #555;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
    gap: 24px;
    margin-top: 24px;
  }

  .card {
    background: white;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .card h2 {
    font-size: 1.05rem;
    margin: 0 0 12px 0;
  }

  .card a {
    color: #247BA0;
    text-decoration: none;
  }

  .card a:hover {
    text-decoration: underline;
  }

  iframe {
    width: 100%;
    height: 360px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: white;
  }
</style>
</head>

<body>
  <h1>STAGdb map browser</h1>
  <p>Interactive map previews. Click any title to open the full map in a new tab.</p>

  <div class="grid">
    
    <div class="card">
      <h2><a href="wild_genets_map.html" target="_blank">Wild samples: genet density map</a></h2>
      <iframe src="wild_genets_map.html" loading="lazy"></iframe>
    </div>
    

    <div class="card">
      <h2><a href="wild_samples_map.html" target="_blank">Wild samples: collapsed site map</a></h2>
      <iframe src="wild_samples_map.html" loading="lazy"></iframe>
    </div>
    

    <div class="card">
      <h2><a href="nursery_genets_map.html" target="_blank">Nursery samples: genet density map</a></h2>
      <iframe src="nursery_genets_map.html" loading="lazy"></iframe>
    </div>
    

    <div class="card">
      <h2><a href="nursery_samples_map.html" target="_blank">Nursery samples: collapsed site map</a></h2>
      <iframe src="nursery_samples_map.html" loading="lazy"></iframe>
    </div>
    
  </div>
</body>
</html>
